# Deploy da Makima: bot Telegram.
# O banco PostgreSQL é gerenciado como serviço separado no Dokploy (Databases → makima-db).
# A variável DATABASE_URL é configurada no painel do Dokploy → Environment.
services:

  makima:
    build:
      # Contexto = raiz do repo (para COPY . . pegar coordinator/ e agents/).
      context: .
      dockerfile: coordinator/Dockerfile
    container_name: makima-bot
    # Injeta variáveis do .env para desenvolvimento local.
    # No Dokploy as vars vêm do painel de Environment, não deste arquivo.
    env_file: .env
    # Reinicia o bot automaticamente se cair ou no boot do host.
    restart: unless-stopped
    networks:
      # Rede padrão do compose (isolamento do serviço)
      - default
      # Rede compartilhada do Dokploy onde o banco PostgreSQL separado roda
      - dokploy-network

  web:
    build:
      # Contexto = raiz do repo (para COPY . . e COPY webapp/frontend/ funcionarem corretamente).
      context: .
      dockerfile: webapp/backend/Dockerfile
    container_name: makima-web
    # Injeta variáveis do .env para desenvolvimento local.
    # No Dokploy as vars vêm do painel de Environment, não deste arquivo.
    env_file: .env
    # Reinicia automaticamente se o container cair ou no boot do host.
    restart: unless-stopped
    ports:
      # Expõe a porta 8080 do container como 8080 no host.
      # O reverse proxy do Dokploy vai rotear o subdomínio para esta porta.
      - "8080:8080"
    networks:
      # Rede padrão do compose (isolamento do serviço)
      - default
      # Rede compartilhada do Dokploy (acesso ao banco e outros serviços)
      - dokploy-network

  # Interface web leve para inspecionar e editar o PostgreSQL via navegador.
  # Acessível apenas em localhost:8082 — não expõe para a internet.
  adminer:
    image: adminer:4-standalone
    container_name: makima-adminer
    restart: unless-stopped
    ports:
      # Vincula ao loopback para não expor publicamente — use SSH tunnel se necessário
      - "127.0.0.1:8082:8080"
    networks:
      - dokploy-network
    environment:
      # Pré-seleciona o host do banco na tela de login do Adminer
      ADMINER_DEFAULT_SERVER: ${DB_HOST:-localhost}

  # Serviço de backup: executa pg_dump diariamente e envia para Google Cloud Storage.
  # O arquivo comprimido fica disponível por 30 dias (lifecycle configurado no bucket GCS).
  #
  # Em vez de usar a imagem genérica python:3.11-slim + bind mount (frágil no Dokploy),
  # construímos uma imagem própria (scripts/Dockerfile.backup) que já traz o pg_dump e o
  # código assado dentro dela. Ver os comentários do Dockerfile para o porquê detalhado.
  #
  # Pré-requisito (uma vez só): criar o bucket GCS `makima-backups` — feito via Python
  # dentro do makima-web, pois o host do VPS não tem o gcloud instalado.
  backup:
    build:
      # Contexto = raiz do repo (para o COPY scripts/ enxergar a pasta scripts/).
      context: .
      dockerfile: scripts/Dockerfile.backup
    container_name: makima-backup
    restart: unless-stopped
    # Injeta as variáveis (DATABASE_URL, GCP_CREDENTIALS_JSON, GCP_PROJECT_ID,
    # GCS_BACKUP_BUCKET) em runtime. No Dokploy elas vêm do painel de Environment.
    env_file: .env
    networks:
      - dokploy-network

  # Serviço de sync da memória unificada da Kurisu (spec 028).
  # Lê as tabelas dos agentes (read-only) e popula o corpus operacional do Vertex AI RAG,
  # de forma incremental (add/remove/edit por hash-manifest). Roda 1x/dia.
  #
  # REUSA a imagem do `web` (mesmo build: webapp/backend/Dockerfile) — ela já traz todo o
  # código (agents/, scripts/) e as deps Python (vertexai, psycopg2, google-cloud-storage).
  # Só trocamos o `command` pelo loop do sync (mesmo padrão do `backup`: loop + sleep 24h,
  # NÃO é cron). O `|| echo` evita derrubar o container se um ciclo falhar.
  #
  # Pré-requisito: VERTEX_RAG_CORPUS_OPERACIONAL no Environment (criado na 1ª execução do
  # sync, se ausente). Roda na dokploy-network para o DATABASE_URL resolver.
  kurisu-sync:
    build:
      # Mesmo build do `web` → o Docker reaproveita a imagem já construída (sem build extra).
      context: .
      dockerfile: webapp/backend/Dockerfile
    container_name: makima-kurisu-sync
    restart: unless-stopped
    env_file: .env
    # Loop: roda o sync e dorme 24h. Cada redeploy reinicia o relógio e dispara um sync.
    command: ["sh", "-c", "while true; do python -m scripts.sync_kurisu_memory || echo 'Sync Kurisu falhou (ver erro acima)'; echo 'Proximo sync em 24h'; sleep 86400; done"]
    networks:
      - dokploy-network

# Declara a rede do Dokploy como externa — já existe, não criamos aqui
networks:
  dokploy-network:
    external: true
