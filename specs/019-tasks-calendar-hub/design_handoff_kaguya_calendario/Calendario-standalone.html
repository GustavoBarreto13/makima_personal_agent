<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kaguya — Calendário (standalone)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;0,800&family=Hanken+Grotesk:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="_shared_styles.css" />
  <link rel="stylesheet" href="cal.css" />
  <style>
    html, body { margin: 0; height: 100%; }
    #root { position: fixed; inset: 0; }
    /* alterne para data-theme="dark" no wrapper abaixo para ver o modo escuro */
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <!-- helpers de data + tarefas mock (compartilhado com a Kaguya) -->
  <script src="_shared_data.js"></script>
  <!-- calendários (bases + integrações) + eventos da semana -->
  <script src="cal-data.js"></script>
  <!-- primitivos: Icon, Check, chips… (compartilhado) -->
  <script type="text/babel" src="_shared_ui.jsx"></script>
  <!-- motor + views + orquestrador do calendário -->
  <script type="text/babel" src="cal-engine.jsx"></script>
  <script type="text/babel" src="cal-views.jsx"></script>
  <script type="text/babel" src="cal.jsx"></script>

  <script type="text/babel">
    /* Troque variant por 'agora' | 'helvetico' | 'editorial'
       e data-theme por 'light' | 'dark'. */
    ReactDOM.createRoot(document.getElementById('root')).render(
      <div className="kg-app kgx-frame" data-theme="light">
        <CalendarPro variant="agora" />
      </div>
    );
  </script>
</body>
</html>
