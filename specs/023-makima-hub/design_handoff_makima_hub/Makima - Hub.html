<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Makima — Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;0,800;1,400;1,700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; }
    body { background: oklch(0.145 0.012 18); min-height: 100vh; }
    a { -webkit-tap-highlight-color: transparent; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script src="makima/data.js"></script>
  <script type="text/babel" src="makima/icons.jsx"></script>
  <script type="text/babel" src="makima/dirA.jsx"></script>

  <script type="text/babel">
    ReactDOM.createRoot(document.getElementById('root')).render(<DirA />);
  </script>

  <div id="tweaks-root"></div>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "tema": "Escuro",
      "vermelho": "Intenso",
      "colunas": "Duas"
    }/*EDITMODE-END*/;

    function applyTweaks(t) {
      const el = document.querySelector('.mkA');
      if (!el) return false;
      el.setAttribute('data-theme', t.tema === 'Claro' ? 'light' : 'dark');
      el.setAttribute('data-red', t.vermelho === 'Sóbrio' ? 'sobrio' : 'intenso');
      el.setAttribute('data-cols', t.colunas === 'Uma' ? '1' : '2');
      document.body.style.background = getComputedStyle(el).getPropertyValue('--bg') || document.body.style.background;
      return true;
    }

    function TweaksApp() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const tRef = React.useRef(t);
      tRef.current = t;

      // aplica (com pequena espera caso o app principal ainda não montou)
      React.useEffect(() => {
        if (!applyTweaks(t)) {
          let n = 0;
          const iv = setInterval(() => { if (applyTweaks(tRef.current) || ++n > 40) clearInterval(iv); }, 25);
          return () => clearInterval(iv);
        }
      }, [t.tema, t.vermelho, t.colunas]);

      // o botão "Tema" no topbar dispara este evento
      React.useEffect(() => {
        const h = () => setTweak('tema', tRef.current.tema === 'Escuro' ? 'Claro' : 'Escuro');
        window.addEventListener('makima:toggletheme', h);
        return () => window.removeEventListener('makima:toggletheme', h);
      }, []);

      return (
        <TweaksPanel>
          <TweakSection label="Aparência" />
          <TweakRadio label="Tema" value={t.tema} options={['Escuro', 'Claro']}
            onChange={v => setTweak('tema', v)} />
          <TweakRadio label="Vermelho" value={t.vermelho} options={['Intenso', 'Sóbrio']}
            onChange={v => setTweak('vermelho', v)} />
          <TweakSection label="Layout" />
          <TweakRadio label="Colunas dos agentes" value={t.colunas} options={['Duas', 'Uma']}
            onChange={v => setTweak('colunas', v)} />
        </TweaksPanel>
      );
    }

    ReactDOM.createRoot(document.getElementById('tweaks-root')).render(<TweaksApp />);
  </script>
</body>
</html>
